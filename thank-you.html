<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - The Law Offices of Joseph A. Odaba</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .thank-you-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          linear-gradient(rgba(27, 10, 7, 0.95), rgba(27, 10, 7, 0.95)),
          url("https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&q=80&w=1600");
        background-size: cover;
        color: white;
        text-align: center;
        padding: 40px 20px;
      }
      .thank-you-box {
        max-width: 600px;
      }
      .thank-you-icon {
        font-size: 80px;
        color: var(--gold-premium);
        margin-bottom: 20px;
      }
      .thank-you-box h1 {
        font-size: 42px;
        color: var(--white);
        margin-bottom: 20px;
        font-weight: normal;
      }
      .thank-you-box p {
        font-size: 18px;
        color: #ebdcd5;
        line-height: 1.7;
        margin-bottom: 30px;
      }
      .thank-you-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="thank-you-page">
      <div class="thank-you-box">
        <div class="thank-you-icon">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1>Message Sent Successfully!</h1>
        <p>
          Thank you for contacting The Law Offices of Joseph A. Odaba. We have
          received your message and will get back to you within 24 hours.
        </p>
        <p>
          For urgent matters, please call us directly:
          <br />
          <strong style="color: var(--gold-premium); font-size: 22px"
            >+1(732) 964-4514</strong
          >
        </p>
        <div class="thank-you-actions">
          <a href="index.html" class="btn-gold-solid">BACK TO HOME</a>
          <a href="tel:+1(732) 964-4514" class="btn-phone-outline">
            <i class="fa-solid fa-phone"></i> CALL NOW
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
